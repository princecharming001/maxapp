<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preset Scan Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap"
  />
  <style>
    /* App theme tokens, mirrored from mobile/theme/dark.ts. */
    :root {
      --background:    #f8f8fa;
      --surface:       #f0f0f3;
      --foreground:    #111113;
      --textMuted:     #a1a1aa;
      --borderLight:   #f0f0f3;
      --warning:       #f59e0b;
      --error:         #ef4444;
      --serif: "Playfair Display", "Iowan Old Style", Georgia, serif;
      --sans:  "Inter", system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #ececef;
      color: var(--foreground);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 32px 24px 80px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 36px;
    }
    @media (max-width: 880px) { .wrap { grid-template-columns: 1fr; } }

    /* ============== LEFT: controls ============== */
    .controls {
      background: #fff;
      border: 1px solid #e3e3e0;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.02);
      position: sticky;
      top: 16px;
      align-self: start;
      max-height: calc(100vh - 32px);
      overflow: auto;
    }
    .controls h1 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 30px;
      letter-spacing: -1px;
      margin: 0 0 4px;
    }
    .lede {
      color: #7c7c80;
      font-size: 13px;
      letter-spacing: 0.1px;
      margin-bottom: 22px;
    }
    .controls h2 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.6px;
      color: #7c7c80;
      text-transform: uppercase;
      margin: 22px 0 8px;
    }
    .controls h2:first-of-type { margin-top: 0; }
    .upload {
      border: 2px dashed #d4d4d0;
      border-radius: 12px;
      padding: 22px;
      text-align: center;
      cursor: pointer;
      color: #7c7c80;
      font-size: 13px;
      background: #fafaf9;
      transition: border-color 120ms ease;
    }
    .upload:hover { border-color: var(--foreground); color: var(--foreground); }
    .upload input { display: none; }
    .row {
      display: grid;
      grid-template-columns: 1fr 90px;
      gap: 8px;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid #f0eeec;
    }
    .row:last-child { border-bottom: none; }
    .row label { font-size: 13px; font-weight: 500; color: #2c2c2e; }
    .row input[type="number"], .row input[type="text"], .row select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #d4d4d0;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      text-align: right;
      background: #fff;
      color: var(--foreground);
    }
    .row input:focus, .row select:focus {
      outline: 2px solid var(--foreground);
      outline-offset: -2px;
    }
    .pills {
      display: flex; flex-wrap: wrap; gap: 6px; padding-top: 4px;
    }
    .pill {
      font-size: 11px; font-weight: 600; letter-spacing: 0.4px;
      text-transform: uppercase; padding: 6px 10px;
      border-radius: 999px; border: 1px solid #d4d4d0;
      background: #fff; cursor: pointer; color: #7c7c80; user-select: none;
    }
    .pill.on { background: var(--foreground); border-color: var(--foreground); color: #fff; }
    .actions { display: flex; gap: 8px; margin-top: 20px; }
    .btn {
      flex: 1; padding: 11px 14px; border-radius: 999px; border: none;
      font-family: inherit; font-size: 13px; font-weight: 600;
      letter-spacing: 0.3px; cursor: pointer;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--foreground); color: #fff; }
    .btn-secondary { background: #fff; color: var(--foreground); border: 1px solid #d4d4d0; }

    /* ============== RIGHT: scan preview (mirrors FaceScanResultsScreen) ============== */
    .preview-frame {
      display: flex; justify-content: center; align-items: flex-start;
    }
    /*
     * Phone-shaped frame so the screenshot reads as in-app capture.
     * Width 390 matches an iPhone 14/15 logical width, which is what
     * FaceScanResultsScreen renders against.
     */
    .scan {
      width: 390px;
      background: var(--background);
      border-radius: 36px;
      box-shadow:
        0 24px 70px -14px rgba(10,10,11,0.20),
        0 0 0 1px rgba(10,10,11,0.06);
      overflow: hidden;
      position: relative;
    }
    .scan .notch {
      position: absolute;
      top: 14px; left: 50%;
      transform: translateX(-50%);
      width: 110px; height: 28px;
      background: #0a0a0b;
      border-radius: 999px;
      z-index: 3;
    }
    .scan-inner {
      /* Mirrors styles.scroll padding from the app. */
      padding: 78px 28px 36px;
    }
    .back-row { margin-bottom: 12px; }
    .back-icon {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      color: var(--foreground); opacity: 0.85;
      font-size: 22px;
    }

    /* AI FACIAL ANALYSIS eyebrow */
    .section-label {
      font-size: 9px;
      font-weight: 600;
      color: var(--textMuted);
      letter-spacing: 2.5px;
      text-align: center;
      margin-bottom: 24px;
      opacity: 0.6;
      text-transform: uppercase;
    }

    /* Photo: 140 circle, thin ring */
    .photo-wrap { display: flex; justify-content: center; margin-bottom: 28px; }
    .photo-ring {
      width: 140px; height: 140px;
      border-radius: 70px;
      overflow: hidden;
      background: var(--surface);
      border: 3px solid rgba(0,0,0,0.04);
      display: flex; align-items: center; justify-content: center;
    }
    .photo-ring img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .photo-ring .empty {
      color: var(--textMuted);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* Bubbles row: RATING / POTENTIAL — 136 circles */
    .bubbles-row {
      display: flex; justify-content: center; gap: 20px; margin-bottom: 24px;
    }
    .bubble {
      width: 136px; height: 136px;
      border-radius: 68px;
      background: var(--background);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border: 1px solid rgba(0,0,0,0.06);
    }
    .bubble-label {
      font-size: 8px; font-weight: 600;
      color: var(--textMuted); letter-spacing: 2px;
      margin-bottom: 2px; opacity: 0.7;
    }
    .bubble-num {
      font-family: var(--serif);
      font-size: 42px; font-weight: 700;
      color: var(--foreground);
      letter-spacing: -2px; line-height: 48px;
    }
    .bubble-unit {
      font-size: 11px; color: var(--textMuted);
      margin-top: 2px; opacity: 0.5;
    }
    /* Score-color tints: matches getScoreColor() in the app. */
    .score-good { color: var(--foreground) !important; }
    .score-mid  { color: var(--warning) !important; }
    .score-low  { color: var(--error) !important; }

    /* Brand wordmark: tiny tracked "max" centered between bubbles + stats */
    .brand {
      font-family: var(--serif);
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--textMuted);
      text-align: center;
      text-transform: uppercase;
      opacity: 0.3;
      margin-bottom: 32px;
    }

    /* Stats: divider rows, label left, value right */
    .stats { margin-bottom: 28px; }
    .stat-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0;
      border-top: 1px solid rgba(0,0,0,0.06);
    }
    .stat-row:first-child { border-top: none; }
    .stat-label {
      font-size: 13px; font-weight: 400;
      color: var(--textMuted); letter-spacing: 0.2px;
    }
    .stat-value {
      font-size: 15px; font-weight: 600;
      color: var(--foreground); letter-spacing: -0.2px;
    }

    /* Recommended pills */
    .recs { margin-bottom: 28px; }
    .recs-heading {
      font-size: 10px; font-weight: 600;
      color: var(--textMuted); letter-spacing: 1.5px;
      text-transform: uppercase; margin-bottom: 12px; opacity: 0.6;
    }
    .recs-pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .rec-pill {
      padding: 8px 16px; border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.1);
      font-size: 12px; font-weight: 500; letter-spacing: 0.1px;
      color: var(--foreground);
    }

    /* Share row */
    .share-row {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; margin-bottom: 24px;
    }
    .share-btn {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 500; color: var(--textMuted);
    }
    .share-dot {
      width: 3px; height: 3px; border-radius: 1.5px;
      background: var(--textMuted); opacity: 0.25;
    }

    /* Disclaimer */
    .disclaimer {
      font-size: 9px; color: var(--textMuted);
      text-align: center; line-height: 13px;
      margin-top: 20px; opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- ============================================================ -->
    <!-- LEFT: controls                                               -->
    <!-- ============================================================ -->
    <aside class="controls">
      <h1>preset scan</h1>
      <div class="lede">build a scan card identical to the app, screenshot it.</div>

      <h2>photo</h2>
      <label class="upload" id="uploadLabel">
        <input type="file" id="photo" accept="image/*" />
        <span id="uploadText">drop or click to upload</span>
      </label>

      <h2>bubbles</h2>
      <div class="row">
        <label>rating /10</label>
        <input type="number" id="rating" min="0" max="10" step="0.1" value="6.8" />
      </div>
      <div class="row">
        <label>potential /10</label>
        <input type="number" id="potential" min="0" max="10" step="0.1" value="8.2" />
      </div>

      <h2>stats</h2>
      <div class="row">
        <label>tier</label>
        <select id="tier">
          <option value="Sub 3">Sub 3</option>
          <option value="Sub 5">Sub 5</option>
          <option value="LTN">LTN</option>
          <option value="MTN" selected>MTN</option>
          <option value="HTN">HTN</option>
          <option value="Chadlite">Chadlite</option>
          <option value="Chad">Chad</option>
        </select>
      </div>
      <div class="row">
        <label>appeal /10</label>
        <input type="number" id="appeal" min="0" max="10" step="0.1" value="7.0" />
      </div>
      <div class="row">
        <label>archetype</label>
        <input type="text" id="archetype" value="Boy-Next-Door" />
      </div>
      <div class="row">
        <label>ascension</label>
        <input type="text" id="ascension" value="Glow-Up" />
      </div>
      <div class="row">
        <label>facial age</label>
        <input type="number" id="age" min="0" max="120" step="1" value="22" />
      </div>

      <h2>recommended</h2>
      <div class="pills" id="recPills">
        <button class="pill" data-id="bonemax">bonemax</button>
        <button class="pill" data-id="skinmax">skinmax</button>
        <button class="pill" data-id="hairmax">hairmax</button>
        <button class="pill" data-id="fitmax">fitmax</button>
        <button class="pill" data-id="heightmax">heightmax</button>
      </div>

      <div class="actions">
        <button class="btn btn-secondary" id="resetBtn">reset</button>
        <button class="btn btn-primary" id="downloadBtn">download png</button>
      </div>
    </aside>

    <!-- ============================================================ -->
    <!-- RIGHT: scan card (mirrors FaceScanResultsScreen.tsx)         -->
    <!-- ============================================================ -->
    <section class="preview-frame">
      <article class="scan" id="scan">
        <div class="notch"></div>

        <div class="scan-inner">
          <div class="back-row"><div class="back-icon">‹</div></div>

          <div class="section-label">AI FACIAL ANALYSIS</div>

          <div class="photo-wrap">
            <div class="photo-ring" id="photoRing">
              <span class="empty">no photo</span>
            </div>
          </div>

          <div class="bubbles-row">
            <div class="bubble">
              <div class="bubble-label">RATING</div>
              <div class="bubble-num" id="o-rating">6.8</div>
              <div class="bubble-unit">/10</div>
            </div>
            <div class="bubble">
              <div class="bubble-label">POTENTIAL</div>
              <div class="bubble-num" id="o-potential">8.2</div>
              <div class="bubble-unit">/10</div>
            </div>
          </div>

          <div class="brand">max</div>

          <div class="stats" id="o-stats">
            <!-- 5 stat-rows injected by JS -->
          </div>

          <div class="recs" id="o-recs">
            <div class="recs-heading">Recommended</div>
            <div class="recs-pills" id="o-recs-pills"></div>
          </div>

          <div class="share-row">
            <div class="share-btn">↓ Save</div>
            <div class="share-dot"></div>
            <div class="share-btn">↗ Share</div>
          </div>

          <div class="disclaimer">For general wellness only — not medical advice.</div>
        </div>
      </article>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    /**
     * preset-scan.html — standalone (NOT part of the maxapp build).
     * Mirrors mobile/screens/scan/FaceScanResultsScreen.tsx pixel-for-pixel:
     * AI FACIAL ANALYSIS eyebrow → circular photo (140) → RATING /
     * POTENTIAL bubbles (136) with score-tinted numbers → tracked "max"
     * wordmark → 5 stat rows (Tier / Appeal / Archetype / Ascension /
     * Facial age) → Recommended pills → Save · Share row → disclaimer.
     */

    const $ = (id) => document.getElementById(id);

    const REC_LABELS = {
      bonemax: "Bonemax",
      skinmax: "Skinmax",
      hairmax: "Hairmax",
      fitmax:  "Fitmax",
      heightmax: "Heightmax",
    };

    function clamp10(v) {
      const n = parseFloat(v);
      if (Number.isNaN(n)) return 0;
      return Math.max(0, Math.min(10, n));
    }
    /** Mirror of getScoreColor() in FaceScanResultsScreen. */
    function scoreClass(v) {
      if (v >= 7) return "score-good";
      if (v >= 5) return "score-mid";
      return "score-low";
    }

    function render() {
      // Bubbles.
      const r = clamp10($("rating").value);
      const p = clamp10($("potential").value);
      const rEl = $("o-rating"), pEl = $("o-potential");
      rEl.textContent = r.toFixed(1);
      pEl.textContent = p.toFixed(1);
      rEl.className = "bubble-num " + scoreClass(r);
      pEl.className = "bubble-num " + scoreClass(p);

      // Stat rows: same order as the app.
      const appeal = clamp10($("appeal").value);
      const stats = [
        ["Tier",       $("tier").value || "—",                                        "score-good"],
        ["Appeal",     appeal > 0 ? `${appeal.toFixed(1)}/10` : "—",                  scoreClass(appeal)],
        ["Archetype",  $("archetype").value || "—",                                   "score-good"],
        ["Ascension",  $("ascension").value || "—",                                   "score-good"],
        ["Facial age", $("age").value ? String(parseInt($("age").value, 10) || 0) : "—", "score-good"],
      ];
      $("o-stats").innerHTML = stats.map(([label, value, klass]) => `
        <div class="stat-row">
          <div class="stat-label">${label}</div>
          <div class="stat-value ${klass}">${value}</div>
        </div>
      `).join("");

      // Recommended.
      const picked = Array.from(document.querySelectorAll("#recPills .pill.on"))
        .map((p) => p.dataset.id);
      const recsEl = $("o-recs");
      const pillsEl = $("o-recs-pills");
      if (picked.length === 0) {
        recsEl.style.display = "none";
      } else {
        recsEl.style.display = "block";
        pillsEl.innerHTML = picked
          .map((id) => `<div class="rec-pill">${REC_LABELS[id] || id}</div>`)
          .join("");
      }
    }

    /* Listeners. */
    document.querySelectorAll(".controls input, .controls select").forEach((el) => {
      el.addEventListener("input", render);
      el.addEventListener("change", render);
    });
    document.querySelectorAll("#recPills .pill").forEach((p) => {
      p.addEventListener("click", () => { p.classList.toggle("on"); render(); });
    });
    /* Default-toggle a couple so the preview isn't empty on load. */
    document.querySelector('#recPills .pill[data-id="bonemax"]').classList.add("on");
    document.querySelector('#recPills .pill[data-id="skinmax"]').classList.add("on");

    /* Photo upload. */
    $("photo").addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      const ring = $("photoRing");
      ring.innerHTML = "";
      const img = document.createElement("img");
      img.src = url;
      img.alt = "face";
      ring.appendChild(img);
      $("uploadText").textContent = file.name;
    });

    /* Reset. */
    $("resetBtn").addEventListener("click", () => {
      if (!confirm("reset all values?")) return;
      window.location.reload();
    });

    /* Download as PNG. */
    $("downloadBtn").addEventListener("click", async () => {
      try {
        const canvas = await html2canvas($("scan"), {
          backgroundColor: null,
          scale: 2,
          useCORS: true,
          allowTaint: true,
        });
        const a = document.createElement("a");
        a.href = canvas.toDataURL("image/png");
        a.download = `preset-scan-${Date.now()}.png`;
        a.click();
      } catch (err) {
        alert("could not export png: " + (err && err.message ? err.message : err));
      }
    });

    render();
  </script>
</body>
</html>
