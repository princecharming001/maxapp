# Authoritative product catalog.
#
# Every product the bot can recommend lives here. Each entry must have a
# DIRECT product URL (not a search). The catalog is the only source for
# LLM recommendations — the agent's `recommend_product` tool reads from
# here, the link rewriter resolves brand mentions against here, and the
# link validator (downstream) rejects URLs not in the catalog.
#
# Adding a product:
#   1. Verify it aligns with the module's coaching docs (rag_content/).
#   2. Pick a stable direct URL (Amazon /dp/<ASIN>/ is preferred — the
#      brand site is acceptable when ASIN can't be confirmed).
#   3. Tag fact-flags accurately. The catalog filter trusts these to
#      drop products the user's facts say to avoid.
#   4. Cite the doc(s) that endorse the type of product in `references`.
#
# Schema (all strings unless noted):
#   id            stable kebab-case slug, unique
#   name          display name shown to user
#   brand         brand the user knows
#   module        skinmax | hairmax | fitmax | heightmax | bonemax | general
#   concerns      [str]  the conditions / goals this addresses (e.g. acne,
#                        dryness, hair_loss, protein, posture)
#   url           DIRECT product page URL (NEVER a search query)
#   price_tier    budget | mid | premium
#   tags          dict of fact-flags (true/false/null=unknown):
#                   vegetarian / vegan / fragrance_free / sulfate_free
#                   gluten_free / dairy_free / cruelty_free
#   rationale     one short sentence on why it's recommended (≤120 chars)
#   references    [str] paths under rag_content/ that endorse it
#
# ─────────────────────────────────────────────────────────────────────────
# Coverage gaps still to fill (verify ASINs on Amazon before committing —
# pasting a fake ASIN ships a broken link). Each line below is a category
# the maxx coaching docs reference but the catalog doesn't yet cover.
# When adding, follow the schema above and cite the source doc in references.
# ─────────────────────────────────────────────────────────────────────────
# skinmax
#   - cleansing balm (oil cleanser for double-cleanse) — heimish all clean balm
#   - vanicream daily moisturizer (fragrance-free, ceramide-rich)
#   - the ordinary lactic acid 10%
#   - beauty of joseon glow serum (propolis + niacinamide)
#   - cosrx salicylic acid daily gentle cleanser
#   - stridex maximum strength acne pads
#   - thinksport mineral spf 50 (zinc oxide)
#   - aquaphor healing ointment (slugging / barrier-rescue)
# hairmax
#   - alpecin caffeine shampoo c1
#   - now foods pumpkin seed oil (capsules)
#   - pura d'or argan oil
#   - bedsure mulberry silk pillowcase
#   - boar bristle brush
#   - leave-in conditioner (it's a 10 miracle, ouai, etc.)
#   - heat protectant spray (chi 44 iron guard, kerastase)
#   - dr squatch peppermint shampoo (men's scalp tingle)
# fitmax
#   - bodylastics resistance bands set
#   - optimum nutrition opti-men multivitamin
#   - now foods beta-alanine powder
#   - now foods bcaa powder
#   - schiek wrist wraps / stoic knee sleeves
#   - theragun mini massage gun
#   - lacrosse ball (mobility)
# bonemax
#   - now foods mastic gum (capsules) — chewing-jaw protocol
#   - 3m micropore paper tape (mouth tape for nasal breathing)
#   - breathe right nasal strips
#   - mewing tongue trainer (chewable)
# heightmax
#   - flexispot e7 standing desk (posture / decompression)
#   - yoga mat (mobility)
#   - lacrosse ball (already useful for fitmax + heightmax)
#   - resistance band loop (face pulls, glute bridges)
# Once verified, copy the schema, paste ASIN into url, and concerns SHOULD be
# >=3 keywords so single-word user queries surface them.

