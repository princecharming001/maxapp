# ── J. Errors / latency / concurrency (4) ───────────────────────────────────
- id: ERR-01
  title: heavy multi-domain ask stays within latency ceiling
  user: skip
  turns:
    - send:
        message: ["build me a complete 12-week plan covering skin, hair and gym, with a weekly table"]
      expect:
        deterministic: [no_friendly_error, no_marker_leak, no_leaked_json, blocks_schema_valid,
                         prose_nonempty, {latency_lt: 90}]
        judge: [answers_the_question, actionability]

# kind: concurrency — runner fires N turns for the SAME user simultaneously
# (violates the normal one-at-a-time pacing on purpose) and checks that the
# per-user lock serializes them: both eventually 200, replies distinct
# (no duplication/interleaving), history shows all rows in order.
- id: ERR-02
  title: same-user concurrent requests serialize cleanly (per-user lock)
  user: skip
  kind: concurrency
  messages:
    - "give me one fact about creatine"
    - "give me one fact about collagen"
  expect_all_ok: true
  expect_distinct_replies: true
  expect_latency_lt: 120

# kind: rate_limit — runner fires N rapid requests for a dedicated user with a
# dedicated X-Forwarded-For and checks every response is either 200 or a clean
# 429 with Retry-After — never a hang or 5xx.
- id: ERR-03
  title: rapid-fire requests get clean 200s or 429s, never a hang/500
  user: skip
  kind: rate_limit
  message: "hi"
  count: 8
  gap_s: 0.2
  expect_only_200_or_429: true

- id: ERR-04
  title: degenerate input handled gracefully
  user: skip
  turns:
    - send:
        message: ["??"]
      expect: {deterministic: [no_friendly_error, prose_nonempty, http_ok]}
    - send:
        message: ["🙂🙂🙂"]
      expect: {deterministic: [no_friendly_error, prose_nonempty, http_ok]}

