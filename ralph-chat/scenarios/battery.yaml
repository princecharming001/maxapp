# battery.yaml — the ralph-chat scenario battery. Schema:
#
# - id: <str>              unique, prefix groups by class (VIS/KNO/MEM/XMEM/CLAR/ONB/VOX/SEC/ERR/PD/PROD)
#   title: <str>
#   user: fresh | skip      faux-signup variant to mint
#   kind: standard | cross_conversation | onboarding_intake | concurrency | rate_limit   (default: standard)
#   turns: [...]            for `standard` kind — see below
#   (kind-specific fields documented inline on the first scenario of each kind)
#
# `standard` turn:
#   - send: {message: [variant, variant, ...], init_context?, chat_intent?}
#     expect: {deterministic: [check, {check: arg}, ...], judge: [dimension, ...]}
#
# Paraphrase selection: variant_index = paraphrase_seed % len(variants) (runner.py).

# ── A. Visual elicitation (6, skip) ─────────────────────────────────────────
