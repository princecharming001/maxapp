                         {no_reask: hair_goal}]
        judge: [answers_the_question]

# ── H. Onboarding intake (2, fresh) ──────────────────────────────────────────
# kind: onboarding_intake — the runner drives up to `max_turns` turns, sending
# `answers` in order (one per server turn) regardless of exact question
# wording, checking `checks_each_turn` on every response. `start` is the
# first message (with init_context/chat_intent). Completion = a turn whose
# response has no `choices` and no `input_widget` and no `progress` (the
# intake driver has handed off / finished), OR `answers` is exhausted.
- id: ONB-01
  title: full fitmax onboarding intake completes without breaking
  user: fresh
  kind: onboarding_intake
  start:
    message: "I want to start my FitMax schedule."
    init_context: fitmax
    chat_intent: start_schedule
  answers:
    - "build muscle"
    - "beginner"
    - "180"
    - "75"
    - "22"
    - "male"
    - "dumbbells at home"
    - "4"
    - "45"
    - "moderate"
    - "none"
  max_turns: 14
  checks_each_turn:
    deterministic: [no_friendly_error, {latency_lt: 45}]
  checks_final:
    deterministic: [no_friendly_error]

- id: ONB-02
  title: mid-intake interruption gets a real answer AND intake resumes
  user: fresh
  kind: onboarding_intake
  start:
    message: "Let's set up HairMax."
    init_context: hairmax
    chat_intent: start_schedule
  answers:
    - "wavy, loose bends"
    - "less thinning"
  interrupt_after_turn: 1
  interrupt_message: "wait — does minoxidil have side effects?"
  interrupt_checks:
    deterministic: [no_friendly_error, prose_nonempty, {latency_lt: 45},
                     {includes_any: ["minoxidil", "side effect"]}]
    judge: [answers_the_question]
  max_turns: 6
  checks_each_turn:
    deterministic: [no_friendly_error]
  resume_check: true   # after the interrupt, next /history call (or next turn) must show pending_question non-null OR the next turn re-presents a question (choices/input_widget)

# ── I. Voice / anti-leak (2, skip) ──────────────────────────────────────────
- id: VOX-01
  title: max voice — no AI-assistant tells
  user: skip
