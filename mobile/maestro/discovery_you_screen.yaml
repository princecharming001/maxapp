appId: com.cannon.mobile
---
# DISCOVERY: YouScreen — profile hub in newNav=false reached via the You tab
# Note: newNav=false, so YouTab maps to YouScreen in the bottom tab.
# BUT: looking at TabNavigator when newNav=false, there is no YouTab —
# it's Home / Planner / Scan / Explore / Chat. YouScreen is ONLY in newNav.
# This file tests via Settings > My Products + Subscription which are reachable.
# Precondition: logged-in paid user
- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 18000

# Get to Settings → My Products
- tapOn:
    accessibilityLabel: "Open profile"
- waitForAnimationToEnd:
    timeout: 8000
- tapOn:
    accessibilityLabel: "Settings"
- waitForAnimationToEnd:
    timeout: 5000

# My Products
- tapOn:
    text: "My products"
- waitForAnimationToEnd:
    timeout: 8000
- assertWithAI:
    assertion: "The My Products screen shows the user's purchased or enrolled programs/courses. Either a list of items or an empty state with a message like 'No purchases yet' or 'Browse Explore'. A back button is in the header."
- assertNoDefectsWithAI
- takeScreenshot: discovery_my_products

# Back and check Manage Subscription
- back
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Manage subscription"
- waitForAnimationToEnd:
    timeout: 8000
- assertWithAI:
    assertion: "The Manage Subscription screen shows the user's current plan, billing cycle, and options to change or cancel. Or a loading state that resolves quickly."
- assertNoDefectsWithAI
- takeScreenshot: discovery_manage_subscription

- back
