appId: com.cannon.mobile
---
# P2 Auth: "Forgot password?" link navigates to reset password screen.
# Precondition: CLEAR_AUTH=1 ./setup_simulator.sh
- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 10000
- assertVisible: "Forgot password?"
- tapOn:
    text: "Forgot password?"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: "reset password"
- assertNotVisible: "Something went wrong"
- takeScreenshot: auth_forgot_password_render
