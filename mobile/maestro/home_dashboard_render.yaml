appId: com.cannon.mobile
---
# P1 Home: dashboard renders HABITS section and no red box for an authenticated user.
# Precondition: logged-in paid (or onboarding-complete) user.
- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 15000
# Select Home explicitly (the app restores the last-active tab on launch). Tap
# by testID — the frosted tab bar + new arch don't expose the labels to the text
# matcher, so we target the stable tabBarButtonTestID added in TabNavigator.tsx.
- tapOn:
    id: "tab-home"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "HABITS"
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Error"
- takeScreenshot: home_dashboard_render_pass
