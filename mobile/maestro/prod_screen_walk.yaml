# Production screen walk — self-contained. Re-enters the paid app via the
# DevDrawer if logged out (faux paid account → also exercises post-pay + the
# main-app tour, verifying the orphan-step fix end-to-end), then walks the tabs
# asserting a screen-specific element on each as the render gate.
# NOTE: kill any stray `maestro` process before running (concurrent sessions
# collide on the device driver).
appId: com.cannon.mobile
---
- launchApp
- waitForAnimationToEnd:
    timeout: 8000
# Re-enter the paid app if we're on the Login screen.
- runFlow:
    when:
      visible: "Continue with Apple"
    commands:
      - tapOn: "DEV"
      - tapOn: "Paid"
      - waitForAnimationToEnd:
          timeout: 9000
# Post-pay scan reveal (fresh paid account) — finish it to reach Home.
- runFlow:
    when:
      visible: "Potential"
    commands:
      - scrollUntilVisible:
          element:
            text: "Get started"
          direction: DOWN
          timeout: 12000
      - tapOn: "Get started"
      - waitForAnimationToEnd:
          timeout: 6000
# Main-app tour auto-starts for the fresh account. Its presence ("Skip" button)
# proves it RENDERS instead of wedging (the P0 fix); dismissing it and then
# tapping through the tabs proves the app is interactive afterwards.
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
      - waitForAnimationToEnd:
          timeout: 2500
# Walk the tabs by their stable testIDs (the frosted tab bar doesn't expose
# labels to Maestro's text matcher). Assert a screen-specific element on each.
- tapOn:
    id: "tab-home"
- assertVisible: "HABITS"
- tapOn:
    id: "tab-planner"
- assertVisible: "Commitments"
- tapOn:
    id: "tab-explore"
- waitForAnimationToEnd:
    timeout: 4000
- tapOn:
    id: "tab-chat"
- assertVisible: "What can I help with?"
